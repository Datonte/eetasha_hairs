<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delivery Options | eetashacollection</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ── Country search ── */
    .country-search-wrap { position:relative; }
    .country-search-input-row {
      display:flex; align-items:center; gap:10px;
      border:1.5px solid var(--gray-200); border-radius:var(--radius);
      background:#fff; padding:0 14px; transition:border-color 0.18s;
    }
    .country-search-input-row:focus-within { border-color:var(--gold-dark); }
    .country-search-input-row .material-symbols-outlined { color:var(--gray-400); font-size:20px; flex-shrink:0; }
    .country-search-input-row input {
      flex:1; border:none; outline:none; padding:12px 0;
      font-size:0.95rem; font-family:inherit; background:transparent;
    }
    .country-clear-btn {
      background:none; border:none; cursor:pointer; color:var(--gray-400);
      font-size:18px; padding:4px; display:none; line-height:1;
    }
    .country-clear-btn.visible { display:block; }

    .country-dropdown {
      position:absolute; top:calc(100% + 6px); left:0; right:0; z-index:200;
      background:#fff; border:1.5px solid var(--gray-200); border-radius:var(--radius);
      box-shadow:0 8px 24px rgba(0,0,0,0.10); max-height:260px; overflow-y:auto;
      display:none;
    }
    .country-dropdown.open { display:block; }
    .country-option {
      display:flex; align-items:center; justify-content:space-between;
      padding:11px 16px; cursor:pointer; font-size:0.92rem;
      transition:background 0.12s;
    }
    .country-option:hover, .country-option.focused { background:var(--gold-bg); }
    .country-option-name { font-weight:500; }
    .country-option-region {
      font-size:0.72rem; font-weight:600; color:var(--gold-dark);
      background:var(--gold-bg); border:1px solid var(--gold-light);
      padding:2px 8px; border-radius:20px; white-space:nowrap;
    }
    .country-no-results { padding:16px; color:var(--gray-400); text-align:center; font-size:0.88rem; }
    .country-selected-display {
      display:none; align-items:center; gap:10px; margin-top:10px;
      padding:10px 14px; border-radius:var(--radius); background:var(--gold-bg);
      border:1px solid var(--gold-light);
    }
    .country-selected-display.visible { display:flex; }
    .country-selected-name { font-weight:600; font-size:0.92rem; color:var(--gold-dark); flex:1; }
    .country-change-btn {
      background:none; border:none; cursor:pointer; font-size:0.78rem;
      color:var(--gray-500); text-decoration:underline; padding:0;
    }
    .country-change-btn:hover { color:var(--gold-dark); }

    /* ── Region badge ── */
    .region-badge {
      display:inline-flex; align-items:center; gap:6px; margin-top:10px;
      padding:6px 14px; border-radius:20px; font-size:0.78rem; font-weight:600;
      background:var(--gold-bg); color:var(--gold-dark); border:1px solid var(--gold-light);
    }

    /* ── Carrier cards ── */
    .carrier-option { cursor:pointer; display:block; }
    .carrier-option input { display:none; }
    .carrier-card {
      display:flex; align-items:center; gap:16px; padding:16px;
      border:2px solid var(--gray-200); border-radius:var(--radius); margin-bottom:10px;
      transition:all var(--transition); background:#fff;
    }
    .carrier-card:hover { border-color:var(--gold-light); }
    .carrier-option input:checked + .carrier-card {
      border-color:var(--gold-dark); background:var(--gold-bg);
    }
    .carrier-logo { font-size:1.8rem; width:40px; text-align:center; flex-shrink:0; }
    .carrier-info { flex:1; }
    .carrier-name { font-weight:700; font-size:0.95rem; }
    .carrier-service { font-size:0.75rem; color:var(--gray-500); }
    .carrier-days { font-size:0.75rem; color:var(--gray-400); margin-top:2px; }
    .carrier-price { font-family:var(--font-head); font-size:1.1rem; color:var(--gold-dark); font-weight:700; }
    .carrier-badges { display:flex; gap:5px; margin-top:5px; flex-wrap:wrap; }
    .badge-cheap { background:var(--gold-bg); color:var(--gold-dark); border:1px solid var(--gold-light); font-size:0.68rem; font-weight:700; padding:2px 8px; border-radius:20px; }
    .badge-fast  { background:#1a1a1a; color:#fff; font-size:0.68rem; font-weight:700; padding:2px 8px; border-radius:20px; }
    .step-badge {
      display:inline-block; background:var(--gold-dark); color:#fff;
      border-radius:50%; width:24px; height:24px; line-height:24px;
      text-align:center; font-size:0.75rem; font-weight:700; margin-right:8px;
    }
  </style>
</head>
<body data-page="delivery">
  <div id="siteNav"></div>

  <section class="section page-top">
    <div class="container" style="max-width:680px;">
      <span class="section-subtitle">Checkout — Step 1 of 2</span>
      <h1 class="serif mb-3">Choose Delivery</h1>

      <div id="deliveryEmpty" class="hidden text-center" style="padding:60px 20px;">
        <span class="material-symbols-outlined" style="font-size:48px;opacity:0.3;margin-bottom:12px;color:var(--gray-400);">shopping_bag</span>
        <p style="color:var(--gray-400);margin-bottom:20px;">Your cart is empty.</p>
        <a href="shop.html" class="btn btn-primary">Browse Products</a>
      </div>

      <div id="deliveryContent">
        <!-- Country -->
        <div class="admin-card mb-3">
          <h3 class="serif mb-2"><span class="step-badge">1</span>Where are we delivering to?</h3>

          <div class="country-search-wrap" id="countrySearchWrap">
            <!-- Search input (shown when no country selected) -->
            <div class="country-search-input-row" id="countryInputRow">
              <span class="material-symbols-outlined">search</span>
              <input
                type="text"
                id="countrySearchInput"
                placeholder="Type a country name…"
                autocomplete="off"
                oninput="onCountrySearch()"
                onfocus="openDropdown()"
                onkeydown="onCountryKeydown(event)"
              >
              <button class="country-clear-btn" id="countryClearBtn" onclick="clearCountry()" title="Clear">✕</button>
            </div>

            <!-- Dropdown results -->
            <div class="country-dropdown" id="countryDropdown"></div>

            <!-- Selected country display -->
            <div class="country-selected-display" id="countrySelectedDisplay">
              <span class="material-symbols-outlined" style="color:var(--gold-dark);font-size:20px;">check_circle</span>
              <span class="country-selected-name" id="countrySelectedName"></span>
              <button class="country-change-btn" onclick="clearCountry()">Change</button>
            </div>
          </div>

          <div id="regionBadge" class="hidden">
            <span class="region-badge" id="regionBadgeText"></span>
          </div>
        </div>

        <!-- Carriers -->
        <div class="admin-card mb-3 hidden" id="carrierSection">
          <h3 class="serif mb-2"><span class="step-badge">2</span>Select a carrier</h3>
          <div id="carrierList"></div>
        </div>

        <button class="btn btn-primary btn-full hidden" id="continueBtn" onclick="continueToCheckout()">
          Continue to Checkout →
        </button>
      </div>
    </div>
  </section>

  <div id="siteFooter"></div>
  <script src="js/app.js"></script>

      { name:'Fiji',                   region:'world'  },

      { name:'Papua New Guinea',       region:'world'  },
    ];

    const REGION_LABELS = {
      uk:     '🇬🇧 United Kingdom',
      europe: '🇪🇺 Europe',
      world:  '🌍 International',
    };
    const REGION_SHORT = { uk:'UK', europe:'Europe', world:'International' };

    // ── Fallback carrier defaults ──
    const FALLBACK_OPTIONS = [
      { id:'evri',          carrier:'Evri',       service:'Standard',   prices:{uk:3.20,  europe:9.99,  world:13.99}, days:{uk:'2-4 days', europe:'5-8 days', world:'8-14 days'}, minDays:{uk:2, europe:5, world:8},  active:true },
      { id:'royal-mail-48', carrier:'Royal Mail', service:'Tracked 48', prices:{uk:3.40,  europe:12.99, world:16.99}, days:{uk:'2-3 days', europe:'5-7 days', world:'7-14 days'}, minDays:{uk:2, europe:5, world:7},  active:true },
      { id:'royal-mail-24', carrier:'Royal Mail', service:'Tracked 24', prices:{uk:4.19,  europe:14.99, world:18.99}, days:{uk:'1-2 days', europe:'5-7 days', world:'7-10 days'}, minDays:{uk:1, europe:5, world:7},  active:true },
      { id:'dpd',           carrier:'DPD',        service:'Next Day',   prices:{uk:7.99,  europe:15.99, world:24.99}, days:{uk:'Next day', europe:'3-5 days', world:'5-8 days'},  minDays:{uk:1, europe:3, world:5},  active:true },
      { id:'dhl',           carrier:'DHL',        service:'Express',    prices:{uk:9.99,  europe:19.99, world:29.99}, days:{uk:'1-2 days', europe:'2-3 days', world:'3-5 days'},  minDays:{uk:1, europe:2, world:3},  active:true },
      { id:'ups',           carrier:'UPS',        service:'Express',    prices:{uk:10.99, europe:22.99, world:34.99}, days:{uk:'1-2 days', europe:'2-3 days', world:'3-5 days'},  minDays:{uk:1, europe:2, world:3},  active:true },
    ];

    const CARRIER_LOGOS = {
      'evri':       '📦',
      'royal-mail-48': '📮',
      'royal-mail-24': '📮',
      'dpd':        '🚚',
      'ups':        '🟤',
      'dhl':        '🟡',
    };

    let _selectedCountry = '';
    let _selectedRegion  = '';
    let _focusedIndex    = -1;
    let _filtered        = [];

    // ── Country search logic ──
    function onCountrySearch() {
      const q = document.getElementById('countrySearchInput').value.trim().toLowerCase();
      document.getElementById('countryClearBtn').classList.toggle('visible', q.length > 0);
      _focusedIndex = -1;
      if (!q) { closeDropdown(); return; }
      _filtered = ALL_COUNTRIES.filter(c => c.name.toLowerCase().includes(q))
                               .sort((a, b) => {
                                 // prioritise starts-with matches
                                 const aStarts = a.name.toLowerCase().startsWith(q) ? 0 : 1;
                                 const bStarts = b.name.toLowerCase().startsWith(q) ? 0 : 1;
                                 return aStarts - bStarts || a.name.localeCompare(b.name);
                               });
      renderDropdown();
      openDropdown();
    }

    function openDropdown() {
      const q = document.getElementById('countrySearchInput').value.trim().toLowerCase();
      if (!q || _selectedCountry) return;
      if (_filtered.length === 0 && q) { renderDropdown(); }
      document.getElementById('countryDropdown').classList.add('open');
    }

    function closeDropdown() {
      document.getElementById('countryDropdown').classList.remove('open');
      _focusedIndex = -1;
    }

    function renderDropdown() {
      const dd = document.getElementById('countryDropdown');
      if (!_filtered.length) {
        dd.innerHTML = '<div class="country-no-results">No countries found — try a different spelling</div>';
        return;
      }
      dd.innerHTML = _filtered.map((c, i) => `
        <div class="country-option" data-index="${i}" onmousedown="selectCountry(${i})">
          <span class="country-option-name">${escHtml(c.name)}</span>
          <span class="country-option-region">${REGION_SHORT[c.region]}</span>
        </div>`).join('');
    }

    function selectCountry(index) {
      const c = _filtered[index];
      if (!c) return;
      _selectedCountry = c.name;
      _selectedRegion  = c.region;

      // Update UI
      document.getElementById('countryInputRow').style.display = 'none';
      const disp = document.getElementById('countrySelectedDisplay');
      disp.classList.add('visible');
      document.getElementById('countrySelectedName').textContent = c.name;
      closeDropdown();

      document.getElementById('regionBadgeText').textContent = REGION_LABELS[c.region] + ' shipping rates apply';
      document.getElementById('regionBadge').classList.remove('hidden');
      document.getElementById('carrierSection').classList.remove('hidden');
      document.getElementById('continueBtn').classList.remove('hidden');
      renderCarriers();
    }

    function clearCountry() {
      _selectedCountry = '';
      _selectedRegion  = '';
      _filtered        = [];
      _focusedIndex    = -1;

      document.getElementById('countryInputRow').style.display = '';
      document.getElementById('countrySelectedDisplay').classList.remove('visible');
      document.getElementById('countrySearchInput').value = '';
      document.getElementById('countryClearBtn').classList.remove('visible');
      document.getElementById('regionBadge').classList.add('hidden');
      document.getElementById('carrierSection').classList.add('hidden');
      document.getElementById('continueBtn').classList.add('hidden');
      closeDropdown();
      document.getElementById('countrySearchInput').focus();
    }

    function onCountryKeydown(e) {
      const dd = document.getElementById('countryDropdown');
      const items = dd.querySelectorAll('.country-option');
      if (!items.length) return;

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        _focusedIndex = Math.min(_focusedIndex + 1, items.length - 1);
        updateFocused(items);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        _focusedIndex = Math.max(_focusedIndex - 1, 0);
        updateFocused(items);
      } else if (e.key === 'Enter' && _focusedIndex >= 0) {
        e.preventDefault();
        selectCountry(_focusedIndex);
      } else if (e.key === 'Escape') {
        closeDropdown();
      }
    }

    function updateFocused(items) {
      items.forEach((el, i) => el.classList.toggle('focused', i === _focusedIndex));
      if (_focusedIndex >= 0) items[_focusedIndex].scrollIntoView({ block:'nearest' });
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', e => {
      if (!document.getElementById('countrySearchWrap').contains(e.target)) closeDropdown();
    });

    // ── Carrier rendering ──
    function renderCarriers() {
      const region = _selectedRegion;
      const { currency } = Store.getSettings();
      const list   = document.getElementById('carrierList');
      const dbOptions = Store.getSettings().deliveryOptions;
      const source    = (dbOptions && dbOptions.length > 0) ? dbOptions : FALLBACK_OPTIONS;

      const options = source
        .filter(o => o.active)
        .sort((a, b) => (a.prices?.[region] || 0) - (b.prices?.[region] || 0));

      if (!options.length) {
        list.innerHTML = '<p style="color:var(--gray-400);text-align:center;padding:20px;">No delivery options available.</p>';
        return;
      }

      const cheapestPrice = Math.min(...options.map(o => o.prices?.[region] || Infinity));
      const fastestDays   = Math.min(...options.map(o => o.minDays?.[region] || Infinity));
      const cheapestIds   = options.filter(o => o.prices?.[region] === cheapestPrice).map(o => o.id);
      const fastestIds    = options.filter(o => o.minDays?.[region] === fastestDays).map(o => o.id);

      list.innerHTML = options.map((o, i) => {
        const isCheapest = cheapestIds.includes(o.id);
        const isFastest  = fastestIds.includes(o.id);
        const isBoth     = isCheapest && isFastest;
        const badges = isBoth
          ? `<div class="carrier-badges"><span class="badge-cheap">💰 Best Value</span></div>`
          : `<div class="carrier-badges">
               ${isCheapest ? `<span class="badge-cheap">💰 Best Price</span>` : ''}
               ${isFastest  ? `<span class="badge-fast">⚡ Fastest</span>`    : ''}
             </div>`;
        return `
        <label class="carrier-option">
          <input type="radio" name="carrier" value="${o.id}" ${i === 0 ? 'checked' : ''}>
          <div class="carrier-card">
            <div class="carrier-logo">${CARRIER_LOGOS[o.id] || '📦'}</div>
            <div class="carrier-info">
              <div class="carrier-name">${escHtml(o.carrier)}</div>
              <div class="carrier-service">${escHtml(o.service)}</div>
              <div class="carrier-days">⏱ ${escHtml(o.days?.[region] || '')}</div>
              ${badges}
            </div>
            <div class="carrier-price">${currency}${Number(o.prices?.[region] || 0).toFixed(2)}</div>
          </div>
        </label>`;
      }).join('');
    }

    // ── Continue to checkout ──
    function continueToCheckout() {
      if (!_selectedCountry || !_selectedRegion) {
        Toast.show('Please select your country.', 'error'); return;
      }
      const carrierId = document.querySelector('input[name="carrier"]:checked')?.value;
      if (!carrierId) { Toast.show('Please select a carrier.', 'error'); return; }

      const dbOpts  = Store.getSettings().deliveryOptions;
      const options = (dbOpts && dbOpts.length > 0) ? dbOpts : FALLBACK_OPTIONS;
      const carrier = options.find(o => o.id === carrierId);
      if (!carrier) { Toast.show('Invalid carrier selected.', 'error'); return; }

      sessionStorage.setItem('et_delivery', JSON.stringify({
        carrierId,
        carrier:     carrier.carrier,
        service:     carrier.service,
        region:      _selectedRegion,
        country:     _selectedCountry,
        regionLabel: REGION_LABELS[_selectedRegion],
        price:       carrier.prices?.[_selectedRegion] || 0,
        days:        carrier.days?.[_selectedRegion]   || '',
      }));

      window.location.href = 'checkout.html';
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await initApp();
      renderNav('');
      renderFooter();
      updateCartCount();

      const cart = Store.getCart();
      if (cart.length === 0) {
        document.getElementById('deliveryContent').classList.add('hidden');
        document.getElementById('deliveryEmpty').classList.remove('hidden');
      }
      document.body.classList.add('page-ready');
    });
  </script>
</body>
</html>
