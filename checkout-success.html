<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Success | eetashacollection</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="siteNav"></div>
  <div class="auth-page">
    <div class="auth-card text-center">
      <span class="material-symbols-outlined" id="statusIcon" style="font-size:56px;color:var(--success);margin-bottom:12px;">check_circle</span>
      <h1 style="font-size:1.6rem;" class="serif mb-1" id="statusTitle">Payment Successful!</h1>
      <p style="color:var(--gray-500);font-size:0.9rem;margin-bottom:20px;" id="statusMsg">Thank you for your order. You'll receive a confirmation shortly.</p>
      <p style="font-family:var(--font-head);color:var(--gold-dark);font-size:1.1rem;margin-bottom:24px;" id="orderId"></p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <a href="/account" class="btn btn-primary btn-sm">View My Orders</a>
        <a href="/shop" class="btn btn-secondary btn-sm">Continue Shopping</a>
      </div>
    </div>
  </div>
  <div id="siteFooter"></div>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await initApp();
      renderNav('');
      renderFooter();


      const params    = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');
      const orderId   = params.get('order_id');

      if (sessionId) {
        // Verify Stripe payment with server
        try {
          const result = await API.get(`/api/verify-payment/${encodeURIComponent(sessionId)}`);
          if (result.paid) {
            document.getElementById('orderId').textContent = `Order: ${result.orderNumber || orderId}`;
          } else {
            document.getElementById('statusIcon').textContent = 'pending';
            document.getElementById('statusIcon').style.color = 'var(--warning)';
            document.getElementById('statusTitle').textContent = 'Payment Pending';
            document.getElementById('statusMsg').textContent   = 'Your payment is being processed. We\'ll confirm your order shortly.';
            if (orderId) document.getElementById('orderId').textContent = `Order: ${orderId}`;
          }
        } catch {
          if (orderId) document.getElementById('orderId').textContent = `Order: ${orderId}`;
        }
      } else if (orderId) {
        // Bank transfer order
        document.getElementById('orderId').textContent = `Order: ${orderId}`;
      }
      document.body.classList.add('page-ready');
    });
  </script>
</body>
</html>
