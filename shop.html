<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop | ee_tasha hairs</title>
  <meta name="description" content="Browse luxury bundles, wigs, frontals, and hair care products. Premium quality, UK delivery.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .shop-filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
    .filter-btn {
      padding: 8px 18px; border-radius: 20px; font-size: 0.75rem;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
      border: 1.5px solid var(--gray-200); background: white; color: var(--gray-600);
      transition: all var(--transition);
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--gold-dark); color: var(--gold-dark); background: var(--gold-bg);
    }
  </style>
</head>
<body data-page="shop" class="page-enter">
  <div id="siteNav"></div>

  <section class="section page-top">
    <div class="container">
      <div class="section-header">
        <div>
          <span class="section-subtitle">Curated Excellence</span>
          <h1 class="serif">The Collection</h1>
        </div>
      </div>

      <div class="shop-filters" id="shopFilters"></div>
      <div class="grid-3" id="shopGrid">
        <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--gray-400);">Loading...</div>
      </div>
      <div id="shopEmpty" class="hidden text-center" style="padding:60px 20px; color: var(--gray-400);">
        <span class="material-symbols-outlined" style="font-size:48px; opacity:0.3; margin-bottom:12px;">inventory_2</span>
        <p>No products in this category yet.</p>
      </div>
    </div>
  </section>

  <div id="siteFooter"></div>
  <script src="js/app.js"></script>
  <script>
    let activeFilter = 'All';

    function renderShop() {
      const products = Store.getProducts();
      const filtered = activeFilter === 'All' ? products : products.filter(p => p.category === activeFilter);
      const grid     = document.getElementById('shopGrid');
      const empty    = document.getElementById('shopEmpty');

      if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
      } else {
        empty.classList.add('hidden');
        grid.innerHTML = filtered.map(productCardHTML).join('');
      }
    }

    function renderFilters() {
      const categories = ['All', ...new Set(Store.getProducts().map(p => p.category).filter(Boolean))];
      document.getElementById('shopFilters').innerHTML = categories.map(c =>
        `<button class="filter-btn ${c === activeFilter ? 'active' : ''}" onclick="setFilter('${escHtml(c)}')">${escHtml(c)}</button>`
      ).join('');
    }

    function setFilter(cat) {
      activeFilter = cat;
      renderFilters();
      renderShop();
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await initApp();
      renderNav('shop');
      renderFooter();
      updateCartCount();
      renderFilters();
      renderShop();
    });
  </script>
</body>
</html>
